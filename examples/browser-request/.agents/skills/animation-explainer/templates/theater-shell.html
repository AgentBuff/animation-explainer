<!doctype html>
<!--
  Theater Shell · animation-explainer skill 的最小骨架
  ─────────────────────────────────────────────────
  这是一个剥离了具体场景内容的模板。包含：
    · 顶栏（brand + 章节 chips + 进度条）
    · 主体（SVG 舞台 + 旁白面板，含 .codeblk 的 white-space:pre 修复）
    · 控件（上/下 · 播放/暂停 · 重播 · 🔊 旁白开关）
    · 状态机 + 键盘快捷键（← → / Space / R / M）
    · 完整 TTS 模块（MP3 优先，Web Speech 兜底，按口播结束驱动推进）
    · 2 个示例场景（青/紫圆圈，演示动画 API）

  使用：
    1. 复制本文件 → 改 <title> 和 CHAPTERS 数组（每项必填 narration）
    2. 替换 SCENE/PANE 内容
    3. 在 runScene(n) 里写每节的动画
    4. 跑 `node scripts/generate-audio.mjs <你的目录>` 生成 MP3

  真做新主题建议直接复制 examples/browser-request/index.html
  来改 — 那里有 5 种已经写好的视觉模式可以参考。
-->
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>[主题名] — animation explainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #060912; --surface: #0e1525; --surface-2: #131c33;
    --border: #21304d; --border-soft: rgba(120,140,200,0.12);
    --text: #e8edf7; --text-dim: #a8b3cc; --muted: #6a7693;
    --cyan: #22d3ee; --violet: #a78bfa; --lime: #a3e635;
    --amber: #fbbf24; --rose: #fb7185; --emerald: #34d399;
    --font-sans: 'Inter', system-ui, sans-serif;
    --font-display: 'Inter Tight', 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  *,*::before,*::after{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    font-family: var(--font-sans); color: var(--text);
    background:
      radial-gradient(1200px 800px at 70% -10%, rgba(167,139,250,0.10), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, rgba(34,211,238,0.08), transparent 60%),
      linear-gradient(180deg, #060912 0%, #04060e 100%);
    background-attachment: fixed; overflow: hidden;
  }
  body::before{
    content:""; position: fixed; inset:0; pointer-events: none; z-index:0;
    background-image:
      linear-gradient(rgba(120,140,200,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120,140,200,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .app{
    position: relative; z-index: 1;
    display: grid; grid-template-rows: auto 1fr auto;
    height: 100vh; max-width: 1280px; margin: 0 auto;
    padding: 18px 28px; gap: 14px;
  }

  .topbar{ display: flex; align-items: center; gap: 18px; }
  .brand{ display:flex; align-items:center; gap: 10px; font-family: var(--font-display); font-weight:700; }
  .brand .dot{ width:10px; height:10px; border-radius:50%;
    background: linear-gradient(135deg, var(--cyan), var(--violet));
    box-shadow: 0 0 18px rgba(167,139,250,0.7); }
  .brand .title{ font-size: 15px; }
  .brand .sub{ color: var(--muted); font-size: 12px; font-weight:500; margin-left:8px; }

  .progress{ flex:1; display:flex; align-items:center; gap:12px; }
  .progress .bar{ flex:1; height:4px; background: var(--surface);
    border:1px solid var(--border-soft); border-radius: 999px; position: relative; overflow:hidden; }
  .progress .bar .fill{ position:absolute; inset:0; width:0%;
    background: linear-gradient(90deg, var(--cyan), var(--violet));
    border-radius:999px; transition: width 0.4s ease; }
  .progress .label{ font-family: var(--font-mono); font-size:12px; color: var(--text-dim); min-width: 38px; text-align: right; }
  .chips{ display:flex; gap:4px; }
  .chip{ width:26px; height:18px; border-radius:5px; background: var(--surface);
    border:1px solid var(--border-soft); cursor:pointer; transition: all 0.2s; }
  .chip:hover{ background: var(--surface-2); border-color: var(--border); }
  .chip.done{ background: rgba(52,211,153,0.18); border-color: rgba(52,211,153,0.5); }
  .chip.active{ background: linear-gradient(135deg, rgba(34,211,238,0.25), rgba(167,139,250,0.25));
    border-color: var(--cyan); box-shadow: 0 0 12px rgba(34,211,238,0.4); }

  .stage-wrap{ display:grid; grid-template-columns: minmax(0, 1.55fr) minmax(360px, 1fr); gap:16px; min-height:0; }
  .stage{ position:relative;
    background: radial-gradient(800px 500px at 30% 20%, rgba(34,211,238,0.05), transparent 60%), var(--surface);
    border:1px solid var(--border); border-radius:16px; overflow:hidden; }
  .stage svg.scene{ position:absolute; inset:0; width:100%; height:100%;
    opacity:0; pointer-events:none; transition: opacity 0.4s ease; }
  .stage svg.scene.active{ opacity:1; pointer-events:auto; }
  .stage-corner{ position:absolute; top:12px; left:14px; font-family: var(--font-mono); font-size:11px; color: var(--muted); letter-spacing: 0.05em; }
  .stage-time{ position:absolute; bottom:12px; right:14px; font-family: var(--font-mono); font-size:11px; color: var(--muted); }

  .narrate{ background: var(--surface); border:1px solid var(--border); border-radius:16px;
    padding: 22px; display:flex; flex-direction:column; min-height:0; overflow:hidden; }
  .narrate .scene-num{ font-family: var(--font-mono); font-size:11px; letter-spacing:0.15em; color: var(--cyan); text-transform:uppercase; }
  .narrate h2{ font-family: var(--font-display); font-weight:700; font-size:24px; line-height:1.15; letter-spacing:-0.02em; margin:6px 0 12px; }
  .narrate .body{ color: var(--text-dim); font-size:14px; line-height:1.65; margin-bottom:14px; }
  .narrate .body em{ color: var(--text); font-style:normal;
    background: linear-gradient(180deg, transparent 60%, rgba(167,139,250,0.22) 60%); padding:0 2px; }
  .narrate .body code{ font-family: var(--font-mono); font-size:12.5px; color: var(--cyan);
    background: rgba(34,211,238,0.07); border:1px solid rgba(34,211,238,0.18); border-radius:4px; padding:1px 5px; }
  .codeblk{ background:#06090f; border:1px solid var(--border); border-radius:10px;
    padding:12px 14px; font-family: var(--font-mono); font-size:12px; line-height:1.65; color: var(--text-dim);
    overflow:auto; max-height:200px; position:relative;
    white-space: pre; tab-size: 2; -moz-tab-size: 2; }
  .codeblk::before{ content: attr(data-lang); position:absolute; top:8px; right:12px;
    font-size:10px; color: var(--muted); text-transform:uppercase; letter-spacing:0.1em; }
  .narrate .pane{ display:none; }
  .narrate .pane.active{ display:block; }

  .controls{ display:flex; align-items:center; gap:10px; background: var(--surface); border:1px solid var(--border); border-radius:10px; padding:8px 12px; }
  .btn{ appearance:none; background: var(--surface-2); color: var(--text); border:1px solid var(--border);
    border-radius:8px; padding:7px 13px; font: 500 13px var(--font-sans); cursor:pointer;
    display:inline-flex; align-items:center; gap:6px; transition: all 0.15s; }
  .btn:hover{ background:#1a2240; border-color:#2c3a5e; }
  .btn:active{ transform: translateY(1px); }
  .btn.primary{ background: linear-gradient(135deg, rgba(34,211,238,0.18), rgba(167,139,250,0.18)); border-color: rgba(34,211,238,0.4); }
  .btn .kbd{ font-family: var(--font-mono); font-size:10px; color: var(--muted);
    border:1px solid var(--border-soft); border-radius:3px; padding:1px 4px; }
  .ctrl-spacer{ flex:1; }
  .chapter-title{ font-size:12.5px; color: var(--text-dim); }
  .chapter-title b{ color: var(--text); font-weight:600; }
</style>
</head>
<body>

<div class="app">

  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <span class="title">[在这里写主题名]</span>
      <span class="sub">[副标题 · N 节]</span>
    </div>
    <div class="progress">
      <div class="chips" id="chips"></div>
      <div class="bar"><div class="fill" id="progressFill"></div></div>
      <div class="label" id="progressLabel">1/2</div>
    </div>
  </header>

  <div class="stage-wrap">
    <div class="stage" id="stage">
      <div class="stage-corner"><span id="cornerIx">SCENE 01</span></div>
      <div class="stage-time" id="stageTime">00:00 / 00:00</div>

      <!-- ═══════ SCENE 1 ═══════ -->
      <svg class="scene" id="scene-1" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet">
        <text x="400" y="60" font-family="Inter" font-size="14" fill="#6a7693" text-anchor="middle">
          SCENE 1 — 在这里画图（用 SVG &lt;rect&gt; &lt;circle&gt; &lt;path&gt; &lt;text&gt;）
        </text>
        <circle id="s1-dot" cx="200" cy="250" r="20" fill="#22d3ee" opacity="0" filter="url(#glow1)"/>
        <text x="400" y="450" font-family="JetBrains Mono" font-size="11" fill="#6a7693" text-anchor="middle">
          示例：runScene(1) 里淡入这个青色圆点
        </text>
        <defs>
          <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
      </svg>

      <!-- ═══════ SCENE 2 ═══════ -->
      <svg class="scene" id="scene-2" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet">
        <text x="400" y="60" font-family="Inter" font-size="14" fill="#6a7693" text-anchor="middle">
          SCENE 2 — 同上
        </text>
        <circle id="s2-dot" cx="200" cy="250" r="20" fill="#a78bfa" opacity="0" filter="url(#glow2)"/>
        <text x="400" y="450" font-family="JetBrains Mono" font-size="11" fill="#6a7693" text-anchor="middle">
          示例：runScene(2) 里把紫色圆点从 x=200 飞到 x=600
        </text>
        <defs>
          <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
      </svg>

    </div>

    <aside class="narrate">

      <div class="pane" data-pane="1">
        <div class="scene-num">SCENE 01 · [章节副题]</div>
        <h2>[第一节的核心命题]</h2>
        <p class="body">
          在这里写 1–3 句旁白。<em>关键名词</em>用 em 高亮，<code>代码/术语</code>用 code 包。
          这里讲清楚<em>为什么</em>这件事重要，而不是 what。
        </p>
        <div class="codeblk" data-lang="bash">
$ <span style="color:#a78bfa">command</span> <span style="color:#fbbf24">--flag</span> <span style="color:#a3e635">"argument"</span>
output line 1
output line 2  <span style="color:#6a7693"># 注释</span>
        </div>
      </div>

      <div class="pane" data-pane="2">
        <div class="scene-num">SCENE 02 · [章节副题]</div>
        <h2>[第二节的核心命题]</h2>
        <p class="body">
          下一节的旁白。每节最多两段，超过就该拆。
        </p>
        <div class="codeblk" data-lang="code">
// 这里可以放任意代码 / 报文 / 日志
        </div>
      </div>

    </aside>
  </div>

  <div class="controls">
    <button class="btn" id="btnPrev">◀ 上一节 <span class="kbd">←</span></button>
    <button class="btn primary" id="btnPlay">▶ 播放 <span class="kbd">Space</span></button>
    <button class="btn" id="btnNext">下一节 ▶ <span class="kbd">→</span></button>
    <button class="btn" id="btnRestart">↻ 重播本节 <span class="kbd">R</span></button>
    <button class="btn" id="btnMute">🔊 旁白开 <span class="kbd">M</span></button>
    <div class="ctrl-spacer"></div>
    <div class="chapter-title" id="chapterTitle"><b>第 1 节</b> · ...</div>
  </div>

</div>

<script>
"use strict";

// ────────────── CHAPTERS ──────────────
// 每项必填 narration（中文口播稿，3–5 句，每句 ≤ 25 字，避免符号污染朗读）
const CHAPTERS = [
  { id:1, title:"第一节标题", duration:10000,
    narration:"这是第一节的口播稿。说两到三句话。最后给个过渡。" },
  { id:2, title:"第二节标题", duration:10000,
    narration:"第二节的口播稿。承接上一节，引出本节的核心点。" },
];

const state = {
  index:0, playing:false, visited:new Set([0]),
  sceneTimer:null, sceneStart:0, rafId:null,
  ttsEnabled:true, ttsSpeaking:false,
};

// ────────────── TTS · MP3 优先，回退 Web Speech ──────────────
// MP3 由 scripts/generate-audio.mjs 用 edge-tts 生成到 audio/ 目录
let useMp3 = null, currentAudio = null, cnVoice = null;

function loadVoices(){
  if (!('speechSynthesis' in window)) return;
  const voices = speechSynthesis.getVoices();
  cnVoice = voices.find(v => v.lang.startsWith('zh') && /premium|enhanced|neural/i.test(v.name))
         || voices.find(v => v.lang.startsWith('zh-CN') || v.lang.startsWith('zh-Hans'))
         || voices.find(v => v.lang.startsWith('zh'))
         || null;
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = loadVoices; loadVoices();
}
async function detectMp3(){
  if (useMp3 !== null) return useMp3;
  try {
    const a = new Audio('audio/scene-1.mp3');
    await new Promise((resolve, reject) => {
      a.oncanplaythrough = resolve; a.onloadedmetadata = resolve;
      a.onerror = reject; setTimeout(reject, 1500); a.load();
    });
    useMp3 = true;
  } catch { useMp3 = false; }
  return useMp3;
}
function webSpeak(text, onEnd){
  if (!('speechSynthesis' in window)) { onEnd && onEnd(); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 1.05;
  if (cnVoice) u.voice = cnVoice;
  u.onstart = () => { state.ttsSpeaking = true; };
  u.onend   = () => { state.ttsSpeaking = false; onEnd && onEnd(); };
  u.onerror = () => { state.ttsSpeaking = false; onEnd && onEnd(); };
  speechSynthesis.speak(u);
}
async function speak(text, idx, onEnd){
  if (!state.ttsEnabled || !text) { onEnd && onEnd(); return; }
  stopSpeak();
  const can = await detectMp3();
  if (can) {
    const a = new Audio(`audio/scene-${idx+1}.mp3`);
    currentAudio = a;
    a.onplay  = () => { state.ttsSpeaking = true; };
    a.onended = () => { state.ttsSpeaking = false; if (currentAudio === a) currentAudio = null; onEnd && onEnd(); };
    a.onerror = () => { if (currentAudio === a) currentAudio = null; webSpeak(text, onEnd); };
    a.play().catch(() => { if (currentAudio === a) currentAudio = null; webSpeak(text, onEnd); });
  } else {
    webSpeak(text, onEnd);
  }
}
function stopSpeak(){
  if (currentAudio) {
    currentAudio.onended = null; currentAudio.onerror = null;
    currentAudio.pause(); currentAudio.currentTime = 0;
    currentAudio = null;
  }
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  state.ttsSpeaking = false;
}

// ────────────── chips ──────────────
const chipsEl = document.getElementById('chips');
CHAPTERS.forEach((c, i) => {
  const el = document.createElement('div');
  el.className = 'chip';
  el.title = `${i+1}. ${c.title}`;
  el.addEventListener('click', () => goTo(i));
  chipsEl.appendChild(el);
});
function refreshChips(){
  [...chipsEl.children].forEach((el, i) => {
    el.classList.toggle('active', i === state.index);
    el.classList.toggle('done', state.visited.has(i) && i !== state.index);
  });
}

// ────────────── 自动推进（按口播结束驱动） ──────────────
const ADVANCE_BUFFER_MS = 1200;
const SAFETY_MAX_MS     = 60000;

function advance(){
  resetSceneTimer();
  if (state.index < CHAPTERS.length - 1) goTo(state.index + 1);
  else { state.playing = false; updatePlayBtn(); stopSpeak(); }
}
function scheduleAdvance(ms){
  if (state.sceneTimer) clearTimeout(state.sceneTimer);
  state.sceneTimer = setTimeout(advance, ms);
}
function resetSceneTimer(){
  if (state.sceneTimer) clearTimeout(state.sceneTimer); state.sceneTimer = null;
  if (state.rafId) cancelAnimationFrame(state.rafId); state.rafId = null;
}
function tickTime(){
  const elapsed = performance.now() - state.sceneStart;
  const f = ms => {
    const t = Math.max(0, Math.floor(ms/1000));
    return String(Math.floor(t/60)).padStart(2,'0') + ':' + String(t%60).padStart(2,'0');
  };
  document.getElementById('stageTime').textContent = `${f(elapsed)} / ${f(CHAPTERS[state.index].duration)}`;
  if (state.playing) state.rafId = requestAnimationFrame(tickTime);
}
function startCurrentScene(){
  state.sceneStart = performance.now();
  const text = CHAPTERS[state.index].narration;
  if (state.ttsEnabled && text) {
    scheduleAdvance(SAFETY_MAX_MS);          // 兜底
    speak(text, state.index, () => {         // 真正的推进信号
      if (state.playing) scheduleAdvance(ADVANCE_BUFFER_MS);
    });
  } else {
    scheduleAdvance(CHAPTERS[state.index].duration);  // 静音回退 duration
  }
  tickTime();
}

// ────────────── goTo / play / pause ──────────────
function goTo(i){
  if (i < 0 || i >= CHAPTERS.length) return;
  state.index = i; state.visited.add(i);
  document.querySelectorAll('svg.scene').forEach(svg => svg.classList.remove('active'));
  document.getElementById(`scene-${i+1}`).classList.add('active');
  document.querySelectorAll('.narrate .pane').forEach(p => p.classList.remove('active'));
  document.querySelector(`.narrate .pane[data-pane="${i+1}"]`).classList.add('active');
  document.getElementById('cornerIx').textContent = `SCENE ${String(i+1).padStart(2,'0')}`;
  document.getElementById('progressLabel').textContent = `${i+1}/${CHAPTERS.length}`;
  document.getElementById('progressFill').style.width = `${(i+1)/CHAPTERS.length * 100}%`;
  document.getElementById('chapterTitle').innerHTML = `<b>第 ${i+1} 节</b> · ${CHAPTERS[i].title}`;
  refreshChips();
  resetSceneTimer(); runScene(i+1);
  if (state.playing) startCurrentScene();
  else speak(CHAPTERS[i].narration, i);
}
function play(){
  if (state.playing) return;
  state.playing = true; updatePlayBtn();
  startCurrentScene();
}
function pause(){
  state.playing = false; updatePlayBtn();
  resetSceneTimer(); stopSpeak();
}
function togglePlay(){ state.playing ? pause() : play(); }
function updatePlayBtn(){
  document.getElementById('btnPlay').innerHTML =
    state.playing ? '⏸ 暂停 <span class="kbd">Space</span>' : '▶ 播放 <span class="kbd">Space</span>';
}
function restartCurrent(){
  resetSceneTimer();
  runScene(state.index + 1);
  if (state.playing) startCurrentScene();
  else speak(CHAPTERS[state.index].narration, state.index);
}

document.getElementById('btnPrev').onclick = () => goTo(state.index - 1);
document.getElementById('btnNext').onclick = () => goTo(state.index + 1);
document.getElementById('btnPlay').onclick = togglePlay;
document.getElementById('btnRestart').onclick = restartCurrent;
document.getElementById('btnMute').onclick = () => {
  state.ttsEnabled = !state.ttsEnabled;
  document.getElementById('btnMute').innerHTML =
    state.ttsEnabled ? '🔊 旁白开 <span class="kbd">M</span>' : '🔇 旁白关 <span class="kbd">M</span>';
  stopSpeak();
  if (state.playing) startCurrentScene();
  else if (state.ttsEnabled) speak(CHAPTERS[state.index].narration, state.index);
};
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  goTo(state.index - 1);
  if (e.key === 'ArrowRight') goTo(state.index + 1);
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  if (e.key === 'r' || e.key === 'R') restartCurrent();
  if (e.key === 'm' || e.key === 'M') document.getElementById('btnMute').click();
});

// ────────────── per-scene animation ──────────────
const sceneTimers = [];
function schedule(fn, delay){ sceneTimers.push(setTimeout(fn, delay)); }
function clearScene(){ sceneTimers.splice(0).forEach(clearTimeout); }
function resetEl(...ids){ ids.forEach(id => { const e = document.getElementById(id); if (e) e.setAttribute('opacity','0'); }); }
function showEl(id, delay=0){
  schedule(() => {
    const e = document.getElementById(id);
    if (e){ e.style.transition = 'opacity 0.5s'; e.setAttribute('opacity','1'); }
  }, delay);
}

function runScene(n){
  clearScene();
  if (n === 1) {
    resetEl('s1-dot');
    showEl('s1-dot', 400);
  }
  if (n === 2) {
    resetEl('s2-dot');
    const dot = document.getElementById('s2-dot');
    dot.setAttribute('cx', '200');
    showEl('s2-dot', 400);
    schedule(() => {
      const start = performance.now(); const dur = 2400;
      function step(ts){
        const p = Math.min(1, (ts - start)/dur);
        const ease = 0.5 - Math.cos(p * Math.PI)/2;
        dot.setAttribute('cx', String(200 + 400 * ease));
        if (p < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }, 1200);
  }
}

// ────────────── init ──────────────
// 关键：先 playing=true 再 goTo，避免 goTo 里 speak 一次、play 里又 speak 一次
state.playing = true;
updatePlayBtn();
goTo(0);
</script>

</body>
</html>
